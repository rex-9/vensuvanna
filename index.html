<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Paṭicca-Samuppāda — Dependent Origination</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══ FIXED CANVAS — everything lives here ══ -->
<div id="canvas">

  <!-- Sky gradient + celestial objects -->
  <div id="sky">
    <div id="sun"></div>
    <div id="moon"></div>
    <div id="stars"></div>
    <div class="cloud" id="c1"></div>
    <div class="cloud" id="c2"></div>
    <div class="cloud" id="c3"></div>
  </div>

  <!-- Ground strip -->
  <div id="ground">
    <svg id="ground-svg" viewBox="0 0 1000 120" preserveAspectRatio="none">
      <!-- layered soil with roots drawn in JS -->
      <defs>
        <linearGradient id="soilGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7a4a2e"/>
          <stop offset="30%" stop-color="#4a2c1a"/>
          <stop offset="100%" stop-color="#1e0e08"/>
        </linearGradient>
        <linearGradient id="waterGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="transparent"/>
          <stop offset="50%" stop-color="#4a9eca" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="transparent"/>
        </linearGradient>
      </defs>
      <rect width="1000" height="120" fill="url(#soilGrad)"/>
      <!-- water veins — animated in CSS -->
      <rect class="wv" x="60" y="28" width="220" height="3" rx="2" fill="url(#waterGrad)"/>
      <rect class="wv" x="300" y="55" width="180" height="3" rx="2" fill="url(#waterGrad)" style="animation-delay:1.2s"/>
      <rect class="wv" x="550" y="38" width="260" height="3" rx="2" fill="url(#waterGrad)" style="animation-delay:0.6s"/>
      <rect class="wv" x="800" y="65" width="150" height="3" rx="2" fill="url(#waterGrad)" style="animation-delay:1.8s"/>
      <!-- roots drawn by JS -->
      <g id="roots"></g>
    </svg>
  </div>

  <!-- ── PLANT character — one SVG morphed per stage ── -->
  <div id="plant-view" class="char-view active">
    <svg id="plant-svg" viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="soilSphereGrad" cx="38%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#a06838"/>
          <stop offset="60%" stop-color="#6b3f28"/>
          <stop offset="100%" stop-color="#2c1810"/>
        </radialGradient>
        <radialGradient id="waterSphereGrad" cx="35%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#8ee0ff"/>
          <stop offset="55%" stop-color="#4a9eca"/>
          <stop offset="100%" stop-color="#1a5a8a"/>
        </radialGradient>
        <radialGradient id="seedGrad" cx="35%" cy="30%" r="65%">
          <stop offset="0%" stop-color="#d4a06a"/>
          <stop offset="60%" stop-color="#8b5a2a"/>
          <stop offset="100%" stop-color="#3a1a08"/>
        </radialGradient>
        <radialGradient id="sproutGrad" cx="35%" cy="25%" r="65%">
          <stop offset="0%" stop-color="#b8f060"/>
          <stop offset="55%" stop-color="#4a9e2a"/>
          <stop offset="100%" stop-color="#1a5a0a"/>
        </radialGradient>
        <radialGradient id="flowerCenterGrad" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#fff8b0"/>
          <stop offset="100%" stop-color="#e8a020"/>
        </radialGradient>
        <radialGradient id="fruitGrad" cx="35%" cy="28%" r="60%">
          <stop offset="0%" stop-color="#ffa060"/>
          <stop offset="55%" stop-color="#e84020"/>
          <stop offset="100%" stop-color="#8a1800"/>
        </radialGradient>
        <radialGradient id="fruitYoungGrad" cx="35%" cy="28%" r="60%">
          <stop offset="0%" stop-color="#c0f060"/>
          <stop offset="55%" stop-color="#5a9820"/>
          <stop offset="100%" stop-color="#2a5008"/>
        </radialGradient>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="10" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="leafFilter" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="1" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#2a6a18"/>
          <stop offset="40%" stop-color="#5ab828"/>
          <stop offset="100%" stop-color="#2a6a18"/>
        </linearGradient>
        <!-- petal gradients -->
        <radialGradient id="petalGrad1" cx="35%" cy="25%" r="70%">
          <stop offset="0%" stop-color="#fff8c0"/>
          <stop offset="60%" stop-color="#f0c030"/>
          <stop offset="100%" stop-color="#c07010"/>
        </radialGradient>
        <radialGradient id="petalGrad2" cx="35%" cy="25%" r="70%">
          <stop offset="0%" stop-color="#ffe0c0"/>
          <stop offset="60%" stop-color="#f08030"/>
          <stop offset="100%" stop-color="#a84010"/>
        </radialGradient>
        <linearGradient id="rootGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5a9820"/>
          <stop offset="100%" stop-color="#2a5010"/>
        </linearGradient>
      </defs>

      <!-- ── STAGE LAYERS — toggled by JS ── -->

      <!-- STAGE 0: Soil sphere + water bubble + seed -->
      <g id="ps0" class="plant-stage">
        <!-- Soil sphere (3D illusion) -->
        <ellipse cx="200" cy="310" rx="130" ry="80" fill="#1a0a04" opacity="0.18"/>
        <circle cx="200" cy="290" r="120" fill="url(#soilSphereGrad)"/>
        <!-- soil texture cracks -->
        <path d="M170 260 Q185 275 178 290" stroke="#2c1810" stroke-width="2" fill="none" opacity="0.6"/>
        <path d="M215 270 Q228 285 220 305" stroke="#2c1810" stroke-width="1.5" fill="none" opacity="0.5"/>
        <path d="M190 300 Q210 308 205 325" stroke="#2c1810" stroke-width="1.5" fill="none" opacity="0.5"/>
        <path d="M155 285 Q170 295 165 310" stroke="#3a1a08" stroke-width="1.5" fill="none" opacity="0.4"/>
        <path d="M230 285 Q245 295 238 310" stroke="#3a1a08" stroke-width="1.5" fill="none" opacity="0.4"/>
        <!-- rim highlight -->
        <ellipse cx="175" cy="248" rx="55" ry="22" fill="white" opacity="0.09"/>
        <!-- Water bubble inside soil -->
        <circle cx="240" cy="310" r="32" fill="url(#waterSphereGrad)" opacity="0.88"/>
        <ellipse cx="231" cy="298" rx="10" ry="6" fill="white" opacity="0.35" transform="rotate(-20,231,298)"/>
        <circle cx="247" cy="302" r="3" fill="white" opacity="0.22"/>
        <!-- Water label inside bubble -->
        <text x="240" y="314" text-anchor="middle" font-size="8" fill="#e8f8ff" font-family="Cinzel" opacity="0.9">Taṇhā</text>
        <!-- seed in soil -->
        <ellipse cx="178" cy="310" rx="22" ry="16" fill="#1a0a04" opacity="0.3"/>
        <ellipse cx="178" cy="305" rx="20" ry="14" fill="url(#seedGrad)"/>
        <ellipse cx="171" cy="299" rx="7" ry="4" fill="white" opacity="0.18" transform="rotate(-25,171,299)"/>
        <!-- seed line -->
        <path d="M167 305 Q178 298 190 305" stroke="#c88a50" stroke-width="1.2" fill="none" opacity="0.6"/>
        <!-- avijja label -->
        <text x="145" y="368" text-anchor="middle" font-size="9" fill="#f0c080" font-family="Cinzel" opacity="0.85">Avijjā</text>
        <!-- kamma label -->
        <text x="178" y="332" text-anchor="middle" font-size="8" fill="#c084f0" font-family="Cinzel" opacity="0.9">Saṅkhāra</text>
      </g>

      <!-- STAGE 1: Sprout / Viññāna -->
      <g id="ps1" class="plant-stage" style="display:none">
        <!-- soil base -->
        <ellipse cx="200" cy="430" rx="160" ry="30" fill="url(#soilSphereGrad)" opacity="0.7"/>
        <!-- main stem -->
        <path d="M200 430 C198 390 196 360 198 320 C199 305 200 290 200 270" stroke="url(#stemGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
        <!-- stem highlight -->
        <path d="M202 430 C201 390 200 360 201 320 C202 305 202 290 202 270" stroke="#8ad840" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
        <!-- sprout tip — teardrop leaf -->
        <path d="M200 270 C188 250 182 228 200 215 C218 228 212 250 200 270Z" fill="url(#sproutGrad)" filter="url(#leafFilter)"/>
        <path d="M200 270 C197 255 196 238 200 215" stroke="#3a8a18" stroke-width="1.2" fill="none" opacity="0.7"/>
        <!-- tip highlight -->
        <ellipse cx="194" cy="235" rx="5" ry="9" fill="white" opacity="0.18" transform="rotate(-10,194,235)"/>
        <!-- root tendrils -->
        <path d="M200 430 Q175 445 155 460" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
        <path d="M200 430 Q225 448 245 458" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
        <path d="M200 430 Q195 450 192 468" stroke="#4a9820" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
        <!-- glow beneath sprout -->
        <ellipse cx="200" cy="270" rx="35" ry="12" fill="#80e830" opacity="0.12" filter="url(#glow)"/>
      </g>

      <!-- STAGE 2: Two shoots / Nāma-Rūpa -->
      <g id="ps2" class="plant-stage" style="display:none">
        <ellipse cx="200" cy="430" rx="160" ry="30" fill="url(#soilSphereGrad)" opacity="0.7"/>
        <!-- trunk -->
        <path d="M200 430 C198 400 197 370 198 340" stroke="url(#stemGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
        <!-- left branch -->
        <path d="M198 340 C185 320 168 308 148 298" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
        <!-- right branch -->
        <path d="M198 340 C210 320 228 308 252 298" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
        <!-- left leaf (Rūpa) -->
        <path d="M148 298 C128 278 115 258 130 238 C150 238 162 260 148 298Z" fill="url(#sproutGrad)" filter="url(#leafFilter)"/>
        <path d="M148 298 C140 278 136 258 130 238" stroke="#3a8a18" stroke-width="1" fill="none" opacity="0.6"/>
        <ellipse cx="136" cy="262" rx="5" ry="11" fill="white" opacity="0.18" transform="rotate(15,136,262)"/>
        <!-- right leaf (Nāma) — slightly different tint -->
        <path d="M252 298 C272 278 285 258 270 238 C250 238 238 260 252 298Z" fill="#60b838" filter="url(#leafFilter)"/>
        <path d="M252 298 C260 278 264 258 270 238" stroke="#3a8a18" stroke-width="1" fill="none" opacity="0.6"/>
        <ellipse cx="264" cy="262" rx="5" ry="11" fill="white" opacity="0.18" transform="rotate(-15,264,262)"/>
        <!-- Rūpa badge -->
        <rect x="90" y="285" width="48" height="18" rx="5" fill="#3a1a08" opacity="0.8"/>
        <text x="114" y="297" text-anchor="middle" font-size="9" fill="#f0c080" font-family="Cinzel">Rūpa</text>
        <!-- Nāma badge -->
        <rect x="265" y="285" width="50" height="18" rx="5" fill="#0a2040" opacity="0.8"/>
        <text x="290" y="297" text-anchor="middle" font-size="9" fill="#a8d4f0" font-family="Cinzel">Nāma</text>
        <!-- roots -->
        <path d="M200 430 Q165 448 140 462" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
        <path d="M200 430 Q235 448 260 462" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
      </g>

      <!-- STAGE 3: Saḷāyatana — 6 branches -->
      <g id="ps3" class="plant-stage" style="display:none">
        <ellipse cx="200" cy="430" rx="160" ry="30" fill="url(#soilSphereGrad)" opacity="0.7"/>
        <!-- trunk -->
        <path d="M200 430 C199 405 198 378 198 350" stroke="url(#stemGrad)" stroke-width="9" fill="none" stroke-linecap="round"/>
        <!-- 6 branches: 3 left, 3 right, fanning out -->
        <!-- left 1 (top) -->
        <path d="M198 350 C182 328 162 316 138 308" stroke="url(#stemGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M138 308 C120 292 112 275 125 260 C140 260 150 278 138 308Z" fill="url(#sproutGrad)" filter="url(#leafFilter)"/>
        <!-- left 2 (mid) -->
        <path d="M198 365 C178 350 158 342 134 338" stroke="url(#stemGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M134 338 C116 325 108 308 122 295 C137 295 146 312 134 338Z" fill="#58b030" filter="url(#leafFilter)"/>
        <!-- left 3 (low) -->
        <path d="M198 382 C175 372 154 368 128 368" stroke="url(#stemGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M128 368 C108 357 100 340 115 328 C130 328 138 345 128 368Z" fill="#4aaa28" filter="url(#leafFilter)"/>
        <!-- right 1 (top) -->
        <path d="M198 350 C214 328 234 316 260 308" stroke="url(#stemGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M260 308 C278 292 286 275 273 260 C258 260 248 278 260 308Z" fill="url(#sproutGrad)" filter="url(#leafFilter)"/>
        <!-- right 2 -->
        <path d="M198 365 C218 350 240 342 265 338" stroke="url(#stemGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M265 338 C283 325 290 308 277 295 C262 295 252 312 265 338Z" fill="#58b030" filter="url(#leafFilter)"/>
        <!-- right 3 -->
        <path d="M198 382 C222 372 244 368 271 368" stroke="url(#stemGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M271 368 C290 357 298 340 284 328 C269 328 260 345 271 368Z" fill="#4aaa28" filter="url(#leafFilter)"/>
        <!-- sense icons — tiny circles at branch tips -->
        <circle cx="125" cy="262" r="9" fill="#0a2040" opacity="0.85"/>
        <text x="125" y="266" text-anchor="middle" font-size="10">👁</text>
        <circle cx="122" cy="298" r="9" fill="#0a2040" opacity="0.85"/>
        <text x="122" y="302" text-anchor="middle" font-size="10">👂</text>
        <circle cx="115" cy="330" r="9" fill="#0a2040" opacity="0.85"/>
        <text x="115" y="334" text-anchor="middle" font-size="10">👃</text>
        <circle cx="273" cy="262" r="9" fill="#0a2040" opacity="0.85"/>
        <text x="273" y="266" text-anchor="middle" font-size="10">👅</text>
        <circle cx="277" cy="298" r="9" fill="#0a2040" opacity="0.85"/>
        <text x="277" y="302" text-anchor="middle" font-size="10">🖐</text>
        <circle cx="284" cy="330" r="9" fill="#0a2040" opacity="0.85"/>
        <text x="284" y="334" text-anchor="middle" font-size="10">🧠</text>
        <!-- roots -->
        <path d="M200 430 Q162 448 138 465" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
        <path d="M200 430 Q238 448 262 465" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
        <path d="M200 430 Q200 452 198 470" stroke="#4a9820" stroke-width="2.5" fill="none" opacity="0.45" stroke-linecap="round"/>
      </g>

      <!-- STAGE 4: Phassa — tight bud -->
      <g id="ps4" class="plant-stage" style="display:none">
        <ellipse cx="200" cy="430" rx="160" ry="30" fill="url(#soilSphereGrad)" opacity="0.7"/>
        <!-- stem -->
        <path d="M200 430 C198 400 197 370 198 330 C199 315 200 295 200 265" stroke="url(#stemGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
        <!-- side leaves -->
        <path d="M199 355 C182 338 170 322 178 305 C192 305 200 322 199 355Z" fill="#4aaa28" filter="url(#leafFilter)"/>
        <path d="M199 355 C216 338 230 322 222 305 C208 305 200 322 199 355Z" fill="#4aaa28" filter="url(#leafFilter)"/>
        <!-- bud — closed, pointed -->
        <path d="M200 265 C188 252 183 232 200 215 C217 232 212 252 200 265Z" fill="#2a7818"/>
        <!-- bud outer petals — barely opening -->
        <path d="M200 258 C192 248 188 235 195 222 C200 230 202 248 200 258Z" fill="#60b038" opacity="0.7"/>
        <path d="M200 258 C208 248 212 235 205 222 C200 230 198 248 200 258Z" fill="#50a828" opacity="0.7"/>
        <!-- blush of color inside bud -->
        <ellipse cx="200" cy="238" rx="8" ry="14" fill="#f0d040" opacity="0.18"/>
        <!-- stem highlight -->
        <path d="M202 430 Q201 380 202 330 Q203 310 202 265" stroke="#8ad840" stroke-width="2" fill="none" opacity="0.4"/>
        <!-- roots -->
        <path d="M200 430 Q168 448 145 462" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
        <path d="M200 430 Q232 448 255 462" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
      </g>

      <!-- STAGE 5: Vedanā — open flower -->
      <g id="ps5" class="plant-stage" style="display:none">
        <ellipse cx="200" cy="430" rx="160" ry="30" fill="url(#soilSphereGrad)" opacity="0.7"/>
        <!-- stem -->
        <path d="M200 430 C198 400 197 370 198 330 C199 315 200 298 200 278" stroke="url(#stemGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
        <!-- side leaves -->
        <path d="M199 360 C178 342 164 322 175 302 C192 302 202 322 199 360Z" fill="#4aaa28" filter="url(#leafFilter)"/>
        <path d="M199 360 C220 342 236 322 225 302 C208 302 198 322 199 360Z" fill="#4aaa28" filter="url(#leafFilter)"/>
        <!-- 6 petals -->
        <g transform="translate(200,248)">
          <ellipse cx="0" cy="-28" rx="14" ry="24" fill="url(#petalGrad1)" transform="rotate(0)" opacity="0.95"/>
          <ellipse cx="0" cy="-28" rx="14" ry="24" fill="url(#petalGrad1)" transform="rotate(60)" opacity="0.95"/>
          <ellipse cx="0" cy="-28" rx="14" ry="24" fill="url(#petalGrad1)" transform="rotate(120)" opacity="0.95"/>
          <ellipse cx="0" cy="-28" rx="14" ry="24" fill="url(#petalGrad2)" transform="rotate(180)" opacity="0.95"/>
          <ellipse cx="0" cy="-28" rx="14" ry="24" fill="url(#petalGrad2)" transform="rotate(240)" opacity="0.95"/>
          <ellipse cx="0" cy="-28" rx="14" ry="24" fill="url(#petalGrad2)" transform="rotate(300)" opacity="0.95"/>
        </g>
        <!-- flower center -->
        <circle cx="200" cy="248" r="18" fill="url(#flowerCenterGrad)" filter="url(#glow)"/>
        <circle cx="200" cy="248" r="12" fill="#f8e060"/>
        <!-- stamens -->
        <circle cx="194" cy="243" r="2.5" fill="#f0a010"/>
        <circle cx="206" cy="243" r="2.5" fill="#f0a010"/>
        <circle cx="200" cy="239" r="2.5" fill="#f0a010"/>
        <circle cx="193" cy="252" r="2" fill="#e08010"/>
        <circle cx="207" cy="252" r="2" fill="#e08010"/>
        <!-- roots -->
        <path d="M200 430 Q165 448 140 465" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
        <path d="M200 430 Q235 448 260 465" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
      </g>

      <!-- STAGE 6: Taṇhā — young green fruit -->
      <g id="ps6" class="plant-stage" style="display:none">
        <ellipse cx="200" cy="430" rx="160" ry="30" fill="url(#soilSphereGrad)" opacity="0.7"/>
        <path d="M200 430 C198 400 197 370 198 330 C199 310 200 295 200 275" stroke="url(#stemGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
        <!-- leaves -->
        <path d="M199 362 C178 344 162 322 174 302 C192 302 202 324 199 362Z" fill="#4aaa28" filter="url(#leafFilter)"/>
        <path d="M199 362 C220 344 238 322 226 302 C208 302 198 324 199 362Z" fill="#4aaa28" filter="url(#leafFilter)"/>
        <!-- small stem to fruit -->
        <path d="M200 275 Q197 262 200 252" stroke="url(#stemGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <!-- young fruit — round, green -->
        <ellipse cx="200" cy="310" rx="202" ry="24" fill="#1a0a04" opacity="0.0"/>
        <circle cx="200" cy="228" r="34" fill="url(#fruitYoungGrad)"/>
        <!-- shine -->
        <ellipse cx="188" cy="216" rx="12" ry="8" fill="white" opacity="0.2" transform="rotate(-20,188,216)"/>
        <circle cx="193" cy="212" r="4" fill="white" opacity="0.15"/>
        <!-- sepals at base -->
        <path d="M184 252 Q200 258 216 252" stroke="#2a6010" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M200 252 L198 262" stroke="url(#stemGrad)" stroke-width="4" fill="none"/>
        <!-- roots -->
        <path d="M200 430 Q165 448 140 465" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
        <path d="M200 430 Q235 448 260 465" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
      </g>

      <!-- STAGE 7: Upādāna — ripe orange-red fruit -->
      <g id="ps7" class="plant-stage" style="display:none">
        <ellipse cx="200" cy="430" rx="160" ry="30" fill="url(#soilSphereGrad)" opacity="0.7"/>
        <path d="M200 430 C198 400 197 370 198 330 C199 308 200 293 200 272" stroke="url(#stemGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
        <!-- leaves -->
        <path d="M199 362 C178 344 162 322 174 302 C192 302 202 324 199 362Z" fill="#4aaa28" filter="url(#leafFilter)"/>
        <path d="M199 362 C220 344 238 322 226 302 C208 302 198 324 199 362Z" fill="#4aaa28" filter="url(#leafFilter)"/>
        <!-- stem to fruit -->
        <path d="M200 272 Q197 258 200 248" stroke="url(#stemGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <!-- large ripe fruit -->
        <circle cx="200" cy="220" r="44" fill="url(#fruitGrad)" filter="url(#softglow)"/>
        <!-- depth shading -->
        <circle cx="200" cy="220" r="44" fill="radial-gradient(circle,transparent 60%,rgba(0,0,0,0.2) 100%)"/>
        <!-- shine -->
        <ellipse cx="183" cy="204" rx="15" ry="10" fill="white" opacity="0.22" transform="rotate(-25,183,204)"/>
        <circle cx="189" cy="200" r="5" fill="white" opacity="0.18"/>
        <!-- secondary shine -->
        <ellipse cx="218" cy="235" rx="8" ry="5" fill="white" opacity="0.08"/>
        <!-- texture hint -->
        <path d="M200 178 Q200 165 200 158" stroke="#6a2808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- sepals -->
        <path d="M182 260 Q200 268 218 260" stroke="#2a6010" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- roots -->
        <path d="M200 430 Q165 448 140 465" stroke="#4a9820" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>
