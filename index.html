<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" type="image/jpeg" href="wheel.jpeg">
  <title>Paṭicca-Samuppāda · Duyên Khởi · Dhamma Talk</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', 'Noto Sans', 'Cinzel', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #b7defa 0%, #6ba2d0 60%, #2c6288 100%);
      transition: background 0.3s ease;
    }

    body.fullscreen-bg {
      background: #000000;
    }

    /* main container */
    .slideshow-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* featured image area */
    .featured-area {
      flex: 1;
      position: relative;
      min-height: 0;
      background: rgba(0, 0, 0, 0.05);
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 10;
    }

    /* image wrapper — preserves aspect ratio, no crop, no stretch */
    .image-frame {
      max-width: 88vw;
      max-height: 70vh;
      width: auto;
      height: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 36px;
      padding: 8px;
      backdrop-filter: blur(4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      transition: all 0.3s ease;
    }

    .image-frame.fullscreen {
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      padding: 0;
      border-radius: 0;
      background: #000000;
      backdrop-filter: none;
      box-shadow: none;
    }

    .image-frame img {
      max-width: 100%;
      max-height: 70vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 28px;
      display: block;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    .image-frame video {
      max-width: 100%;
      max-height: 70vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 28px;
      display: block;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    .image-frame.fullscreen img,
    .image-frame.fullscreen video {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
      border-radius: 0;
      box-shadow: none;
    }

    /* ===== HORIZONTAL CAROUSEL (MENU) ===== */
    .carousel-section {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(212, 175, 55, 0.3);
      padding: 12px 0;
      transition: all 0.3s ease;
    }

    .carousel-section.hidden {
      display: none;
    }

    .carousel-container {
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #d4af37 #2a2a3a;
      margin: 0px 16px 64px 16px;
    }

    .carousel-container::-webkit-scrollbar {
      height: 5px;
    }

    .carousel-container::-webkit-scrollbar-track {
      background: #2a2a3a;
      border-radius: 10px;
    }

    .carousel-container::-webkit-scrollbar-thumb {
      background: #d4af37;
      border-radius: 10px;
    }

    .carousel-track {
      display: flex;
      gap: 12px;
      padding: 8px 0 12px 0;
      min-width: min-content;
    }

    .carousel-item {
      flex-shrink: 0;
      width: 100px;
      height: 70px;
      background: rgba(20, 25, 40, 0.8);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .carousel-item:hover {
      transform: translateY(-3px);
      border-color: #d4af37aa;
    }

    .carousel-item.active {
      border-color: #d4af37;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
      transform: scale(1.02);
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /* Video thumbnail overlay for carousel */
    .video-thumb {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
    }

    .video-thumb::after {
      content: "▶";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 20px;
      background: rgba(0, 0, 0, 0.6);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-family: monospace;
    }

    /* navigation buttons */
    .nav-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 30;
      display: flex;
      gap: 10px;
      background: rgba(10, 14, 23, 0.8);
      backdrop-filter: blur(16px);
      padding: 8px 14px;
      border-radius: 50px;
      border: 1px solid rgba(212, 175, 55, 0.5);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease;
    }

    .nav-controls.hidden {
      opacity: 0;
      pointer-events: none;
    }

    button {
      background: rgba(25, 30, 45, 0.85);
      border: none;
      color: #ffdf88;
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Cinzel', 'Segoe UI', monospace;
      font-weight: 600;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid rgba(212, 175, 55, 0.4);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-width: 40px;
    }

    button:hover:not(:disabled) {
      background: #d4af37;
      color: #1a1a2a;
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #linkBtn {
      background: rgba(35, 45, 65, 0.9);
    }

    /* slide counter */
    .slide-counter {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(10, 14, 23, 0.8);
      backdrop-filter: blur(16px);
      padding: 5px 14px;
      border-radius: 50px;
      color: #f0e6b0;
      font-family: 'Cinzel', monospace;
      font-size: 0.85rem;
      z-index: 30;
      border: 1px solid rgba(212, 175, 55, 0.5);
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .slide-counter.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .counter-display {
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 40px;
      transition: background 0.2s;
    }

    .counter-display:hover {
      background: rgba(212, 175, 55, 0.2);
    }

    .counter-input {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #d4af37;
      color: #ffdf88;
      font-family: 'Cinzel', monospace;
      font-size: 0.85rem;
      padding: 3px 8px;
      border-radius: 40px;
      width: 60px;
      text-align: center;
      outline: none;
    }

    /* fullscreen adjustments */
    body.fullscreen-bg .carousel-section,
    body.fullscreen-bg .nav-controls:not(.hidden),
    body.fullscreen-bg .slide-counter:not(.hidden) {
      display: none;
    }

    body.fullscreen-bg .featured-area {
      flex: 1;
    }

    body.fullscreen-bg .image-frame {
      max-width: 100vw;
      max-height: 100vh;
    }

    @media (max-width: 768px) {
      .carousel-item {
        width: 70px;
        height: 50px;
      }
      .image-frame {
        max-height: 60vh;
      }
      .image-frame img,
      .image-frame video {
        max-height: 60vh;
      }
      button {
        padding: 5px 10px;
        font-size: 0.75rem;
        min-width: 34px;
      }
      .slide-counter {
        font-size: 0.7rem;
        padding: 4px 10px;
      }
      .video-thumb::after {
        width: 22px;
        height: 22px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<div class="slideshow-container" id="slideshowContainer">
  <div class="featured-area" id="featuredArea"></div>
  <div class="carousel-section" id="carouselSection">
    <div class="carousel-container" id="carouselContainer">
      <div class="carousel-track" id="carouselTrack"></div>
    </div>
  </div>
</div>

<div class="nav-controls">
  <button id="firstBtn" title="First slide">⏮️</button>
  <button id="prevBtn" title="Previous">⬅️</button>
  <button id="linkBtn" title="Match (space)">🔄</button>
  <button id="nextBtn" title="Next">➡️</button>
  <button id="lastBtn" title="Last">⏭️</button>
</div>
<div class="slide-counter" id="slideCounter">
  <span class="counter-display" id="counterDisplay">1</span>
  <span class="counter-sep">/</span>
  <span id="totalSlidesSpan">0</span>
</div>

<script>
  // ============================================================
  // FLEXIBLE IMAGE ARRAY — EDIT THIS FOR ANY DHAMMA TALK
  // ============================================================

  const imageUrls = [
    "cover.png",

    // ### ASUBHA: SPIDER, KHEMA AND 10-ASUBHA ###:
    "spider.mp4",
    "1-spider.png",
    "2-spider.png",
    "3-spider.png",
    "4-spider.png",
    "5-spider.png",
    "1-khema-young.png",
    "2-khema-midage.png",
    "3-khema-old.png",
    "4-khema-death.png",
    "5-khema-skeleton.png",
    "6-khema-all.png",
    "tenasubha.png",
    "32-1-kesa.png",
    "32-2-loma.png",
    "32-3-nakha.png",
    "32-4-danta.png",
    "32-5-taco.png",
    "32-6-mansam.png",
    "32-7-nharu.png",
    "32-8-atthi.png",
    "32-9-atthiminja.png",
    "32-10-vakka.png",
    "32-11-hadaya.png",
    "32-12-yakanam.png",
    "32-13-kilomakam.png",
    "32-14-pihakam.png",
    "32-15-papphasam.png",
    "32-16-antam.png",
    "32-17-antagunam.png",
    "32-18-udariyam.png",
    "32-19-karisam.png",
    "32-20-matthalumkam.png",
    "32-21-pittam.png",
    "32-22-semham.png",
    "32-23-pubbo.png",
    "32-24-lohitam.png",
    "32-25-sedo.png",
    "32-26-medo.png",
    "32-27-assu.png",
    "32-28-vasa.png",
    "32-29-khelo.png",
    "32-30-singhanika.png",
    "32-31-lasika.png",
    "32-32-muttam.png",


    // ### PATICCA-SAMUPPĀDA ###:
    // "menu.png",
    // "p1-sankhara.png", // avijja, tanha, sankhara
    // "p2-vinnana.png", // vinnana
    // "p3-namarupa.png", // nama-rupa
    // "p4-salayatana.png", // salayatana
    // "p5-phassa.png", // phassa
    // "p6-vedana.png", // vedana
    // "p7-tanha.png", // tanha
    // "p8-upadana.png", // upadana
    // "p9-bhava.png", // bhava
    // "p10-jati.png", // jati
    // "p11-cycle.png",
    // "p12transition.png",
    // "h1-vinnana.png", // vinnana
    // "h2-namarupa.png", // nama-rupa
    // "h3-abbuda.png", // abbuda
    // "h4-pesi.png", // pesi
    // "h5-ghana.png", // ghana
    // "h6-pancasakha.png", // pankasakha
    // "h7-garbhavastha.png", // garbhavastha
    // "h8-salayatana.png", // salayatana
    // "h9-phassa.png", // phassa
    // "h10-vedana.png", // vedana
    // "h11-tanha.png", // tanha
    // "h12-bhava.png", // bhava
    // "h13-jati.png", // jati
    // "h14-jara.png", // jara
    // "h15-byadhi.png", // byadhi
    // "h16-marana.png", // marana
    // "h17-soka.png", // soka, parideva, dukkha, domanassa, upayasa
    // "h18-cuti.png", // cuti citta
    // "h19-cycle.png",

    "thank.png"
  ];

  const TOTAL_SLIDES = imageUrls.length;

  // Helper: check if file is video
  function isVideoFile(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    return ['mp4', 'webm', 'ogg', 'mov', 'avi', 'mkv'].includes(ext);
  }

  // Extract base name for linking
  function extractBaseName(filename) {
    const match = filename.match(/-([a-z]+)\.(png|jpg|jpeg|mp4|webm|mov)$/i);
    if (match) return match[1];
    const simpleMatch = filename.match(/([a-z]+)\.(png|jpg|jpeg|mp4|webm|mov)$/i);
    return simpleMatch ? simpleMatch[1] : null;
  }

  // Build linking map
  const slidesByName = {};
  for (let i = 0; i < TOTAL_SLIDES; i++) {
    const name = extractBaseName(imageUrls[i]);
    if (name) {
      if (!slidesByName[name]) slidesByName[name] = [];
      slidesByName[name].push(i);
    }
  }

  function getLinkedSlideIndex(currentIdx) {
    const filename = imageUrls[currentIdx];
    const baseName = extractBaseName(filename);
    if (!baseName || !slidesByName[baseName]) return -1;
    const matches = slidesByName[baseName];
    if (matches.length <= 1) return -1;
    const currentPos = matches.indexOf(currentIdx);
    const nextIdx = (currentPos + 1) % matches.length;
    return matches[nextIdx];
  }

  // URL and storage
  function getSlideFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    const slideParam = urlParams.get('slide');
    if (slideParam) {
      const slideNum = parseInt(slideParam, 10);
      if (!isNaN(slideNum) && slideNum >= 1 && slideNum <= TOTAL_SLIDES) return slideNum - 1;
    }
    const saved = localStorage.getItem('dhammaTalkLastSlide');
    if (saved) {
      const s = parseInt(saved, 10);
      if (!isNaN(s) && s >= 0 && s < TOTAL_SLIDES) return s;
    }
    return 0;
  }

  function updateURL(slideIndex) {
    const newUrl = new URL(window.location.href);
    newUrl.searchParams.set('slide', slideIndex + 1);
    window.history.pushState({}, '', newUrl);
    localStorage.setItem('dhammaTalkLastSlide', slideIndex);
  }

  // DOM elements
  const featuredArea = document.getElementById("featuredArea");
  const carouselTrack = document.getElementById("carouselTrack");
  const firstBtn = document.getElementById("firstBtn");
  const prevBtn = document.getElementById("prevBtn");
  const linkBtn = document.getElementById("linkBtn");
  const nextBtn = document.getElementById("nextBtn");
  const lastBtn = document.getElementById("lastBtn");
  const counterDisplay = document.getElementById("counterDisplay");
  const totalSlidesSpan = document.getElementById("totalSlidesSpan");
  const bodyEl = document.body;
  const navControls = document.querySelector(".nav-controls");
  const slideCounter = document.getElementById("slideCounter");
  const carouselSection = document.getElementById("carouselSection");

  let currentIndex = getSlideFromURL();
  let transitionLock = false;
  let editMode = false;
  let isFullscreen = false;

  // Build featured slides with image/video support
  function buildSlides() {
    featuredArea.innerHTML = "";
    for (let i = 0; i < TOTAL_SLIDES; i++) {
      const slide = document.createElement("div");
      slide.className = "slide";
      if (i === currentIndex) slide.classList.add("active");
      const frame = document.createElement("div");
      frame.className = "image-frame";

      const fileUrl = imageUrls[i];
      const isVideo = isVideoFile(fileUrl);

      if (isVideo) {
        const video = document.createElement("video");
        video.src = fileUrl;
        video.autoplay = false;
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.controls = true;
        video.style.maxWidth = "100%";
        video.style.maxHeight = "70vh";
        video.style.width = "auto";
        video.style.height = "auto";
        video.style.objectFit = "contain";
        frame.appendChild(video);
      } else {
        const img = document.createElement("img");
        img.src = fileUrl;
        img.alt = `Slide ${i + 1}`;
        img.onerror = function() {
          this.src = "https://placehold.co/1200x800/2a2a3a/d4af37?text=Missing";
        };
        frame.appendChild(img);
      }

      slide.appendChild(frame);
      featuredArea.appendChild(slide);
    }
    totalSlidesSpan.innerText = TOTAL_SLIDES;
    updateCounterDisplay();
  }

  // Build carousel preview with video thumbnails (using first frame via poster or img)
  function buildCarousel() {
    carouselTrack.innerHTML = "";
    for (let i = 0; i < TOTAL_SLIDES; i++) {
      const item = document.createElement("div");
      item.className = "carousel-item";
      if (i === currentIndex) item.classList.add("active");

      const fileUrl = imageUrls[i];
      const isVideo = isVideoFile(fileUrl);

      if (isVideo) {
        // For video: create div with play icon overlay, use video element to extract frame (or use img fallback)
        const thumbDiv = document.createElement("div");
        thumbDiv.className = "video-thumb";
        const video = document.createElement("video");
        video.src = fileUrl;
        video.muted = true;
        video.playsInline = true;
        video.preload = "metadata";
        video.style.width = "100%";
        video.style.height = "100%";
        video.style.objectFit = "cover";
        // Seek to first frame and capture as thumbnail
        video.addEventListener("loadeddata", function() {
          this.currentTime = 0.1;
        });
        video.addEventListener("seeked", function() {
          // Create canvas to capture frame
          const canvas = document.createElement("canvas");
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const img = document.createElement("img");
          img.src = canvas.toDataURL();
          img.style.width = "100%";
          img.style.height = "100%";
          img.style.objectFit = "cover";
          thumbDiv.innerHTML = "";
          thumbDiv.appendChild(img);
          // Clean up
          video.pause();
        });
        video.load();
        thumbDiv.appendChild(video);
        item.appendChild(thumbDiv);
      } else {
        const img = document.createElement("img");
        img.src = fileUrl;
        img.alt = `thumb ${i+1}`;
        img.onerror = function() { this.src = "https://placehold.co/100x70/2a2a3a/d4af37?text=?"; };
        item.appendChild(img);
      }

      item.addEventListener("click", (function(idx) {
        return function() { if (!isFullscreen && !transitionLock) showSlide(idx); };
      })(i));
      carouselTrack.appendChild(item);
    }
  }

  function updateCarouselActive() {
    const items = document.querySelectorAll(".carousel-item");
    items.forEach((item, idx) => {
      if (idx === currentIndex) item.classList.add("active");
      else item.classList.remove("active");
    });
    const activeItem = items[currentIndex];
    if (activeItem && !isFullscreen) {
      activeItem.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
    }
  }

  function updateCounterDisplay() {
    counterDisplay.innerText = currentIndex + 1;
  }

  function updateButtonsState() {
    // First button: disabled at first slide
    firstBtn.disabled = (currentIndex === 0);
    // Prev button: disabled at first slide
    prevBtn.disabled = (currentIndex === 0);
    // Next button: disabled at last slide
    nextBtn.disabled = (currentIndex === TOTAL_SLIDES - 1);
    // Last button: disabled at last slide
    lastBtn.disabled = (currentIndex === TOTAL_SLIDES - 1);
    // Link button: enabled only if there's a matching slide
    const linked = getLinkedSlideIndex(currentIndex);
    linkBtn.disabled = (linked === -1 || linked === currentIndex);
  }

  function showSlide(index, updateUrlParam = true) {
    if (transitionLock) return;
    if (index < 0) index = 0;
    if (index >= TOTAL_SLIDES) index = TOTAL_SLIDES - 1;
    if (index === currentIndex) return;

    transitionLock = true;
    const slides = document.querySelectorAll(".slide");
    if (!slides.length) { transitionLock = false; return; }

    if (isFullscreen) {
      slides[currentIndex]?.querySelector(".image-frame")?.classList.remove("fullscreen");
    }

    slides[currentIndex]?.classList.remove("active");
    slides[index]?.classList.add("active");

    if (isFullscreen) {
      slides[index]?.querySelector(".image-frame")?.classList.add("fullscreen");
    }

    currentIndex = index;
    updateCounterDisplay();
    updateButtonsState();
    updateCarouselActive();

    if (updateUrlParam) updateURL(currentIndex);

    setTimeout(() => { transitionLock = false; }, 500);
  }

  function firstSlide() { if (currentIndex !== 0) showSlide(0); }
  function prevSlide() { if (currentIndex > 0) showSlide(currentIndex - 1); }
  function nextSlide() { if (currentIndex + 1 < TOTAL_SLIDES) showSlide(currentIndex + 1); }
  function lastSlide() { if (currentIndex !== TOTAL_SLIDES - 1) showSlide(TOTAL_SLIDES - 1); }
  function jumpToLinked() {
    const linked = getLinkedSlideIndex(currentIndex);
    if (linked !== -1 && linked !== currentIndex) showSlide(linked);
  }

  // Fullscreen toggle
  function toggleFullscreen() {
    const slides = document.querySelectorAll(".slide");
    const activeSlide = slides[currentIndex];
    const imageFrame = activeSlide?.querySelector(".image-frame");

    isFullscreen = !isFullscreen;

    if (isFullscreen) {
      bodyEl.classList.add("fullscreen-bg");
      imageFrame?.classList.add("fullscreen");
      navControls.classList.add("hidden");
      slideCounter.classList.add("hidden");
      carouselSection.classList.add("hidden");
    } else {
      bodyEl.classList.remove("fullscreen-bg");
      imageFrame?.classList.remove("fullscreen");
      navControls.classList.remove("hidden");
      slideCounter.classList.remove("hidden");
      carouselSection.classList.remove("hidden");
    }
  }

  // Typeable counter
  function initTypeableCounter() {
    const parent = document.getElementById("slideCounter");
    const displaySpan = counterDisplay;
    displaySpan.addEventListener("click", (e) => {
      if (editMode || isFullscreen) return;
      e.stopPropagation();
      editMode = true;
      const input = document.createElement("input");
      input.type = "number";
      input.className = "counter-input";
      input.value = currentIndex + 1;
      input.min = 1;
      input.max = TOTAL_SLIDES;
      input.step = 1;
      parent.replaceChild(input, displaySpan);
      input.focus();
      input.select();

      function commit() {
        if (!editMode) return;
        let val = parseInt(input.value, 10);
        if (isNaN(val)) val = currentIndex + 1;
        val = Math.max(1, Math.min(TOTAL_SLIDES, val));
        const newIndex = val - 1;
        parent.replaceChild(displaySpan, input);
        editMode = false;
        if (newIndex !== currentIndex) showSlide(newIndex);
        else updateCounterDisplay();
      }
      input.addEventListener("blur", commit);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); commit(); }
        else if (e.key === "Escape") { parent.replaceChild(displaySpan, input); editMode = false; updateCounterDisplay(); }
      });
    });
  }

  // ========== KEYBOARD CONTROLS ==========
  function handleKeydown(e) {
    if (transitionLock || editMode) return;

    // Fullscreen toggle on 'f' or 'F'
    if (e.key === 'f' || e.key === 'F') {
      e.preventDefault();
      toggleFullscreen();
      return;
    }

    // Arrow keys navigation
    if (e.key === "ArrowRight") {
      e.preventDefault();
      nextSlide();
    } else if (e.key === "ArrowLeft") {
      e.preventDefault();
      prevSlide();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      firstSlide();
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      lastSlide();
    } else if (e.key === " " || e.key === "Space") {
      if (!linkBtn.disabled) {
        e.preventDefault();
        jumpToLinked();
      }
    }
  }

  // Handle browser back/forward navigation
  function handlePopState() {
    const newSlide = getSlideFromURL();
    if (newSlide !== currentIndex) showSlide(newSlide, false); // Don't update URL again (already from URL)
  }

  // ========== Initialization ==========
  function init() {
    buildSlides();
    buildCarousel();
    initTypeableCounter();
    updateButtonsState();
    updateCarouselActive();

    window.addEventListener("keydown", handleKeydown);
    window.addEventListener("popstate", handlePopState);

    firstBtn.addEventListener("click", firstSlide);
    prevBtn.addEventListener("click", prevSlide);
    linkBtn.addEventListener("click", jumpToLinked);
    nextBtn.addEventListener("click", nextSlide);
    lastBtn.addEventListener("click", lastSlide);

    if (!new URLSearchParams(window.location.search).has('slide')) updateURL(currentIndex);
  }

  init();
</script>
</body>
