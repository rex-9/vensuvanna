<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <link rel="icon" type="image/jpeg" href="wheel.jpeg" />
  <title>Dhamma Slides · topics.json</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="slideshow-container">
    <div class="featured-area" id="featuredArea"></div>
    <div class="carousel-section" id="carouselSection">
      <div class="carousel-container" id="carouselContainer">
        <div class="carousel-track" id="carouselTrack"></div>
      </div>
    </div>
  </div>

  <div class="nav-controls">
    <button id="topicBtn">📂 Topics</button>
    <button id="firstBtn">⏮️</button>
    <button id="prevBtn">⬅️</button>
    <button id="linkBtn">🔄</button>
    <button id="nextBtn">➡️</button>
    <button id="lastBtn">⏭️</button>
  </div>

  <div class="slide-counter">
    <span class="counter-display" id="counterDisplay">1</span>
    <span class="counter-sep">/</span>
    <span id="totalSlidesSpan">0</span>
  </div>

  <div class="topic-overlay" id="topicOverlay">
    <div class="topic-modal">
      <h2>📖 Select Topic</h2>
      <div class="topic-list" id="topicList"></div>
      <button class="topic-close" id="topicCloseBtn">✕ Close</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
