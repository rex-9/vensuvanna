<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <link rel="icon" type="image/jpeg" href="wheel.jpeg" />
  <title>Dhamma Slides · topics.json</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="slideshow-container">
    <div class="featured-area" id="featuredArea"></div>
    <div class="carousel-section" id="carouselSection">
      <div class="carousel-container" id="carouselContainer">
        <div class="carousel-track" id="carouselTrack"></div>
      </div>
    </div>
  </div>

  <div class="nav-controls">
    <button id="topicBtn">📂 Topics</button>
    <button id="firstBtn">⏮️</button>
    <button id="prevBtn">⬅️</button>
    <button id="linkBtn">🔄</button>
    <button id="nextBtn">➡️</button>
    <button id="lastBtn">⏭️</button>
  </div>

  <div class="slide-counter">
    <a href="index.html" class="profile-link" title="Back to Profile">
      <svg height="18" width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </a>
    <span class="counter-display" id="counterDisplay">1</span>
    <span class="counter-sep">/</span>
    <span id="totalSlidesSpan">0</span>
    <a href="https://github.com/rex-9/vensuvanna" target="_blank" class="github-link">
      <svg height="18" width="18" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>

  <div class="topic-overlay" id="topicOverlay">
    <div class="topic-modal">
      <h2>📖 Select Topic</h2>
      <div class="topic-list" id="topicList"></div>
      <button class="topic-close" id="topicCloseBtn">✕ Close</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
